<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fellowship Gems - Season 3</title>
  <style>
    :root {
      --bg: #f7f7f3;
      --panel: #ffffff;
      --text: #1d2527;
      --muted: #5d686b;
      --line: #d9ddda;
      --accent: #256f6d;
      --accent-2: #7b4d9a;
      --warn: #a75817;
      --good: #1f7a4d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.4;
    }

    main {
      width: min(1320px, calc(100% - 32px));
      margin: 24px auto 48px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      line-height: 1.15;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.secondary {
      background: var(--panel);
      color: var(--accent);
    }

    button:active {
      transform: translateY(1px);
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 6px;
      padding: 7px 8px;
      min-height: 36px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    label.active-field,
    .gem-row.active-field .gem-color {
      color: var(--text);
      font-weight: 700;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .s1-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(220px, 280px) 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .planner-panel > div + div {
      margin-top: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .targets-panel .color-grid {
      grid-template-columns: 1fr;
    }

    .gem-matrix {
      display: grid;
      gap: 8px;
    }

    .gem-row {
      display: grid;
      grid-template-columns: minmax(90px, 1.2fr) repeat(4, minmax(54px, 1fr));
      gap: 6px;
      align-items: center;
    }

    .gem-row.header {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .gem-row input {
      min-height: 32px;
      padding: 5px 6px;
    }

    .gem-matrix.disabled {
      opacity: 0.55;
    }

    .checks {
      display: grid;
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .check input {
      width: auto;
      min-height: auto;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #eef7f3;
      color: var(--good);
      border: 1px solid #bddbcc;
      font-weight: 600;
    }

    .status.warn {
      background: #fff4e9;
      color: var(--warn);
      border-color: #f0c79e;
    }

    .option {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      background: white;
    }

    .option-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .option-title {
      font-weight: 700;
    }

    .metrics {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #edf1f0;
      color: #2e383a;
      padding: 3px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.accent {
      background: #e7f2f1;
      color: var(--accent);
    }

    .needed {
      color: var(--warn);
      font-weight: 700;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .details ul {
      margin: 4px 0 0;
      padding-left: 18px;
    }

    .option-main {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .option-extra {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
      color: var(--text);
      font-size: 13px;
    }

    .option-main ul,
    .option-extra ul {
      margin: 4px 0 0;
      padding-left: 18px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfbf9;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .details,
      .option-main,
      .option-extra {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }
    }

    @media (min-width: 901px) and (max-width: 1180px) {
      .layout {
        grid-template-columns: minmax(300px, 390px) 1fr;
      }

      .targets-panel {
        grid-column: 1;
      }

      .result-panel {
        grid-column: 2;
        grid-row: 1 / span 2;
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 20px, 1180px);
      }

      .grid-2,
      .grid-3,
      .color-grid,
      .checks {
        grid-template-columns: 1fr;
      }

      .gem-row {
        grid-template-columns: minmax(82px, 1.2fr) repeat(4, minmax(44px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>Fellowship Gems - Season 3</h1>
      </div>
      <a class="s1-link" href="s1/index.html">Open Season 1/2 calculator</a>
    </div>

    <div class="layout">
      <section class="panel planner-panel">
        <h2>Planner</h2>

        <div>
          <div class="grid-2">
            <label>
              Sockets
              <input id="socketCount" type="number" min="0" max="4" value="4" />
            </label>
            <label>
              Max item gem power mods
              <input id="maxMods" type="number" min="0" max="28" value="26" />
            </label>
          </div>
          <div class="checks" style="margin-top: 10px;">
            <label class="check">
              <input id="legendary" type="checkbox" checked />
              Legendary item equipped
            </label>
          </div>
          <p class="hint" id="maxModsHint">Default max is 28 item gem power mods, or 26 with legendary.</p>
          <label class="check" style="margin-top: 10px;">
            <input id="ignoreOvercap" type="checkbox" checked />
            Ignore overcap when choosing options
          </label>
        </div>

        <div>
          <h2>Current item gem power mods</h2>
          <label class="check" style="margin-bottom: 10px;">
            <input id="setBonus" type="checkbox" checked />
            Set bonus x1.25
          </label>
          <label class="check" style="margin-bottom: 10px;">
            <input id="allowAddedMods" type="checkbox" checked />
            Add extra item gem power mods/sets if needed
          </label>
          <div class="color-grid" id="modInputs"></div>
        </div>

        <div>
          <h2>Available gems</h2>
          <label class="check" style="margin-bottom: 10px;">
            <input id="unlimitedGems" type="checkbox" />
            Unlimited gems
          </label>
          <div class="gem-matrix" id="gemInputs"></div>
        </div>

      </section>

      <section class="panel targets-panel">
        <h2>Targets</h2>
        <div class="color-grid" id="targetInputs"></div>
        <div class="actions" style="margin-top: 14px;">
          <button id="calculateBtn">Calculate</button>
          <button class="secondary" id="resetBtn">Reset</button>
        </div>
      </section>

      <section class="panel result-panel">
        <h2>Result</h2>
        <div id="result" class="empty">Choose targets and calculate.</div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
